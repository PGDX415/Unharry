name: Unhurry
options:
  bundleIdPrefix: com.gongdexin.paul
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: en
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  Unhurry:
    type: application
    platform: iOS
    sources:
      - path: Unhurry
    resources:
      - path: Unhurry/Resources/Audio
        type: folder
      - path: Unhurry/Base.lproj/LaunchScreen.storyboard
    dependencies:
      - target: UnhurryWidget
    settings:
      base:
        DEVELOPMENT_TEAM: SJ8DC28NRH
        PRODUCT_BUNDLE_IDENTIFIER: com.gongdexin.paul.Unhurry
        CODE_SIGN_ENTITLEMENTS: Unhurry/Unhurry.entitlements
        INFOPLIST_FILE: Unhurry/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        SWIFT_EMIT_LOC_STRINGS: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        CODE_SIGN_STYLE: Automatic
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        STRING_CATALOG_GENERATE_SYMBOLS: YES
        SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES

  UnhurryWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: UnhurryWidget
      - path: Unhurry/Models/MixPreset.swift
    settings:
      base:
        DEVELOPMENT_TEAM: SJ8DC28NRH
        PRODUCT_BUNDLE_IDENTIFIER: com.gongdexin.paul.Unhurry.widget
        CODE_SIGN_ENTITLEMENTS: UnhurryWidget/UnhurryWidget.entitlements
        INFOPLIST_FILE: UnhurryWidget/Info.plist
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: "5.0"
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        CODE_SIGN_STYLE: Automatic
        SKIP_INSTALL: YES

  UnhurryTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: UnhurryTests
    dependencies:
      - target: Unhurry
    settings:
      base:
        DEVELOPMENT_TEAM: SJ8DC28NRH
        PRODUCT_BUNDLE_IDENTIFIER: com.gongdexin.paul.UnhurryTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        CODE_SIGN_STYLE: Automatic
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Unhurry.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Unhurry"
        BUNDLE_LOADER: "$(TEST_HOST)"
